<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stack Rush</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="ui-bar">
      <div class="score-container">SCORE: <span id="score">0</span></div>
      <div class="combo-container">COMBO: <span id="combo">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="screen" id="startScreen">
      <h1>STACK RUSH</h1>
      <p class="subtitle">APILA CON PRECISIÓN</p>
      <button id="startButton">JUGAR</button>
      <div class="controls-info">
        <p>Pulsa ESPACIO o haz click para colocar el bloque</p>
        <p>¡Alinea perfectamente para combos!</p>
      </div>
    </div>

    <div class="screen hidden" id="gameOverScreen">
      <h1 class="game-over-title">FIN DEL JUEGO</h1>
      <p>Puntaje Final: <span id="finalScore">0</span></p>
      <button id="restartButton">REINTENTAR</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
